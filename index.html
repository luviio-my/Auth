<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth2U by luviio.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['Geist Mono', 'monospace'],
          },
          colors: {
            surface: {
              DEFAULT: '#000000',
              raised: '#0A0A0A',
              overlay: '#111111',
            },
            glass: {
              light: 'rgba(255, 255, 255, 0.03)',
              medium: 'rgba(255, 255, 255, 0.05)',
              heavy: 'rgba(255, 255, 255, 0.08)',
              border: 'rgba(255, 255, 255, 0.08)',
              'border-hover': 'rgba(255, 255, 255, 0.15)',
            },
            accent: {
              blue: '#0070F3',
              purple: '#7928CA',
              cyan: '#00D4FF',
              magenta: '#EB367F',
              lime: '#95BF47',
            },
            text: {
              primary: '#FFFFFF',
              secondary: '#A1A1AA',
              tertiary: '#71717A',
              muted: '#52525B',
            }
          },
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    html { scroll-behavior: smooth; background: #000000; }

    /* Liquid Glass Base */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-strong {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .glass-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    
    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.06), transparent 40%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    
    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
    }
    
    .glass-card:hover::before {
      opacity: 1;
    }

    /* Ambient Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
      animation: float 20s ease-in-out infinite;
    }
    
    .orb-blue { background: radial-gradient(circle, rgba(0,112,243,0.4) 0%, transparent 70%); }
    .orb-purple { background: radial-gradient(circle, rgba(121,40,202,0.35) 0%, transparent 70%); }
    .orb-cyan { background: radial-gradient(circle, rgba(0,212,255,0.3) 0%, transparent 70%); }
    .orb-magenta { background: radial-gradient(circle, rgba(235,54,127,0.25) 0%, transparent 70%); }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 30px) scale(1.02); }
    }

    /* Grid Pattern */
    .grid-pattern {
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    /* Noise Texture */
    .noise {
      position: relative;
    }
    .noise::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,112,243,0.3); }
      50% { box-shadow: 0 0 40px rgba(0,112,243,0.5); }
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .animate-fade-up {
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }

    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #0070F3 0%, #00D4FF 50%, #7928CA 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 8s ease infinite;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #0070F3 0%, #0056D4 100%);
      color: white;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px rgba(0,112,243,0.5), 0 0 20px rgba(0,212,255,0.2);
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: translateY(0) scale(0.98); }

    .btn-glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-glass:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    /* Nav Link */
    .nav-link {
      position: relative;
      color: rgba(255,255,255,0.5);
      transition: color 0.3s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #0070F3, #00D4FF);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 1px;
    }
    .nav-link:hover, .nav-link.active { color: white; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    /* Code Block */
    .code-block {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Geist Mono', monospace;
    }

    /* Toast */
    .toast {
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Mobile Menu */
    .mobile-menu {
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .mobile-menu.open { transform: translateX(0); }
    .mobile-overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .mobile-overlay.open { opacity: 1; pointer-events: auto; }

    /* Input Styles */
    .input-glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      transition: all 0.3s;
    }
    .input-glass:focus {
      outline: none;
      border-color: rgba(0,112,243,0.5);
      box-shadow: 0 0 0 3px rgba(0,112,243,0.1), 0 0 20px rgba(0,112,243,0.1);
      background: rgba(255,255,255,0.05);
    }
    .input-glass::placeholder { color: rgba(255,255,255,0.3); }

    /* Feature Icon */
    .feature-icon {
      background: linear-gradient(135deg, rgba(0,112,243,0.2) 0%, rgba(121,40,202,0.2) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-card:hover .feature-icon {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 20px rgba(0,112,243,0.3);
    }

    /* SPA Transitions */
    #app-content {
      transition: opacity 0.3s ease, filter 0.3s ease;
    }
    #app-content.fading {
      opacity: 0;
      filter: blur(10px);
    }

    /* Dot Pulse */
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    .pulse-dot { animation: dot-pulse 2s ease-in-out infinite; }

    /* Glow Ring */
    .glow-ring {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 0 30px -5px rgba(0,112,243,0.3);
    }

    /* Pricing Page Specific Styles - ENHANCED BRIGHTNESS & UI */
    .pricing-grid-bg {
      background-image: 
        linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .pricing-line {
      border-color: rgba(255,255,255,0.18);
    }

    .pricing-card {
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .pricing-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .pricing-card:hover {
      background: #0f0f0f;
      border-color: rgba(255, 255, 255, 0.32);
      transform: translateY(-6px);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .pricing-card:hover::before {
      opacity: 1;
    }

    .btn-pricing {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .btn-pricing:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px -10px currentColor;
    }

    .table-row-pricing {
      border-top: 1px solid rgba(255,255,255,0.14);
      background: #050505;
      transition: all 0.2s ease;
    }
    .table-row-pricing:hover {
      background: #0c0c0c;
      border-top-color: rgba(255,255,255,0.22);
    }

    /* Redesigned FAQ Section */
    .faq-container {
      display: grid;
      gap: 12px;
    }

    .faq-item-pricing {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      background: #080808;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
      position: relative;
    }

    .faq-item-pricing::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #0070F3, #00D4FF);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .faq-item-pricing:hover {
      background: #0d0d0d;
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 4px 20px -8px rgba(0,0,0,0.5);
    }

    .faq-item-pricing.active {
      background: #0a0a0a;
      border-color: rgba(0,112,243,0.35);
      box-shadow: 0 8px 30px -10px rgba(0,112,243,0.15);
    }

    .faq-item-pricing.active::before {
      opacity: 1;
    }

    .faq-btn-pricing {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      transition: all 0.3s;
    }

    .faq-btn-pricing:hover span:last-child {
      color: #0070F3;
      transform: rotate(45deg);
    }

    .faq-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      font-size: 18px;
      line-height: 1;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
    }

    .faq-item-pricing.active .faq-icon {
      background: linear-gradient(135deg, #0070F3, #0056D4);
      color: white;
      transform: rotate(45deg);
      box-shadow: 0 4px 12px rgba(0,112,243,0.3);
    }

    .faq-content-pricing {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.16, 1, 0.3, 1), padding 0.35s ease;
      padding: 0 24px;
    }

    .faq-item-pricing.active .faq-content-pricing {
      max-height: 300px;
      padding: 0 24px 24px;
    }

    .faq-text {
      color: rgba(161,161,170,0.85);
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    /* Status Page Styles */
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-operational { background: #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.5); }
    .status-degraded { background: #eab308; box-shadow: 0 0 10px rgba(234,179,8,0.5); }
    .status-down { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }

    .uptime-bar {
      height: 32px;
      display: flex;
      gap: 2px;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
    }
    .uptime-segment {
      flex: 1;
      background: #22c55e;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .uptime-segment:hover { opacity: 1; }
    .uptime-segment.down { background: #ef4444; }

    /* Docs Sidebar */
    .docs-sidebar {
      position: sticky;
      top: 80px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    .docs-nav-item {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.2s;
      display: block;
      text-decoration: none;
    }
    .docs-nav-item:hover, .docs-nav-item.active {
      background: rgba(255,255,255,0.05);
      color: white;
    }
    .docs-nav-section {
      margin-bottom: 16px;
    }
    .docs-nav-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #52525b;
      padding: 8px 12px 4px;
    }

    /* Pricing specific enhancements */
    .pricing-header-deco {
      position: relative;
    }
    .pricing-header-deco::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #0070F3, #00D4FF);
      border-radius: 2px;
      opacity: 0.6;
    }

    .popular-badge {
      background: linear-gradient(135deg, #0070F3 0%, #00D4FF 100%);
      box-shadow: 0 4px 15px rgba(0,112,243,0.4);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .check-icon {
      color: #95BF47;
      flex-shrink: 0;
    }

    .cross-icon {
      color: #3f3f46;
      flex-shrink: 0;
    }

    /* Feature highlight in table */
    .feature-highlight {
      background: rgba(0,112,243,0.08);
      border-left: 2px solid #0070F3;
    }

        /* Auth Loading Spinner */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    
    /* Dashboard Specific Styles */
    .dashboard-stat {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
    }
    .dashboard-stat:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body class="font-sans bg-surface text-text-secondary antialiased overflow-x-hidden">

  <!-- Navigation -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
    <div class="absolute inset-0 glass-strong opacity-0 transition-opacity duration-300" id="navBg"></div>
    <div class="max-w-[1200px] mx-auto px-6 h-16 flex items-center justify-between relative z-10">
      <!-- Logo -->
      <div class="flex items-center gap-8">
        <a href="#/" class="flex items-center gap-2.5 group spa-link">
          <div class="relative">
            <svg width="24" height="22" viewBox="0 0 76 65" fill="white" class="transition-transform duration-300 group-hover:scale-110">
              <path d="M37.5274 0L75.0548 65H0L37.5274 0Z"/>
            </svg>
            <div class="absolute inset-0 bg-accent-blue blur-lg opacity-0 group-hover:opacity-50 transition-opacity duration-300"></div>
          </div>
          <span class="text-white font-semibold text-[15px] tracking-tight">Auth2U</span>
        </a>
        <!-- Desktop Nav Links -->
        <div class="hidden lg:flex items-center gap-1">
          <a href="/" class="nav-link spa-link text-[14px] px-3 py-2" data-route="">Home</a>
          <a href="/features" class="nav-link spa-link text-[14px] px-3 py-2" data-route="features">Features</a>
          <a href="/docs" class="nav-link spa-link text-[14px] px-3 py-2" data-route="docs">Docs</a>
          <a href="/pricing" class="nav-link spa-link text-[14px] px-3 py-2" data-route="pricing">Pricing</a>
          <a href="/status" class="nav-link spa-link text-[14px] px-3 py-2" data-route="status">Status</a>
        </div>
      </div>
      <!-- Desktop Right -->
      <div class="hidden lg:flex items-center gap-3" id="navRightContent">
        <!-- Dynamic content based on auth state -->
      </div>
      <!-- Mobile Hamburger -->
      <button id="hamburger" class="lg:hidden p-2 -mr-2 text-white/60 hover:text-white transition-colors" aria-label="Menu">
        <span class="iconify" data-icon="lucide:menu" data-width="22" data-height="22"></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu Overlay -->
  <div id="mobileOverlay" class="mobile-overlay fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm"></div>

  <!-- Mobile Menu Drawer -->
  <div id="mobileMenu" class="mobile-menu fixed top-0 left-0 bottom-0 z-[70] w-[300px] bg-surface/95 backdrop-blur-xl border-r border-white/5">
    <div class="flex items-center justify-between p-6 border-b border-white/5">
      <div class="flex items-center gap-2">
        <svg width="20" height="18" viewBox="0 0 76 65" fill="white"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z"/></svg>
        <span class="font-semibold text-[15px] text-white">Auth2U</span>
      </div>
      <button id="closeMobile" class="p-1 text-white/40 hover:text-white transition-colors">
        <span class="iconify" data-icon="lucide:x" data-width="20" data-height="20"></span>
      </button>
    </div>
    <div class="p-6 flex flex-col gap-1" id="mobileMenuContent">
      <!-- Dynamic content -->
    </div>
  </div>

  <!-- SPA App Container -->
  <main id="app-content" class="min-h-screen pt-16 relative">
    <!-- Content Injected via JS -->

function router() {
  // Get clean path from URL
  let path = window.location.pathname;
  
  // Normalize: ensure leading slash, remove trailing slash (except root)
  if (!path.startsWith('/')) path = '/' + path;
  if (path.length > 1 && path.endsWith('/')) path = path.slice(0, -1);
  
  // Fallback to root if empty
  if (path === '' || path === '/') path = '/';
  
  // Protect dashboard route
  if (path === '/dashboard' && !isAuthenticated()) {
    navigateTo('/login');
    showToast('Please log in to access dashboard');
    return;
  }
  
  // Redirect logged in users away from login/signup
  if ((path === '/login' || path === '/signup') && isAuthenticated()) {
    navigateTo('/dashboard');
    return;
  }
  
  const routeHandler = routes[path] || notFoundPage;
  
  // Update active nav link
  document.querySelectorAll('.nav-link').forEach(link => {
    if (link.dataset.route === path.replace('/', '')) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });

  closeMobileMenu();
  updateNavForAuthState();

  // Transition animation
  appContent.classList.add('fading');
  setTimeout(() => {
    appContent.innerHTML = routeHandler();
    appContent.classList.remove('fading');
    window.scrollTo({ top: 0, behavior: 'instant' });
    initPageScripts();
  }, 250);
}

    // --- Auth2U API Integration ---
    async function sendOTP(email) {
      const form = document.getElementById('loginFormEmail') || document.getElementById('emailLoginForm');
      const btn = form?.querySelector('button[type="submit"]');
      
      const resetButton = () => {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = 'Send OTP Code';
        }
      };

      try {
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<span class="iconify animate-spin" data-icon="lucide:loader-2" data-width="16"></span> Sending...';
        }

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);

        const res = await fetch(AUTH_API + "/auth/email/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            email,
            purpose: 'login'
          }),
          signal: controller.signal
        });

        clearTimeout(timeoutId);
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.message || data.error || 'Failed to send OTP');
        
        showToast(`📧 Code sent to ${email}`);
        showVerificationStep(email, form);
        return data;
        
      } catch (error) {
        if (error.name === 'AbortError') {
          showToast('⏰ Connection timed out. Check your internet.');
        } else {
          showToast(error.message || 'Network error. Please try again.');
        }
        console.error('Send OTP Error:', error);
        throw error;
        
      } finally {
        resetButton();
      }
    }
    
    // VERIFY OTP - Integrated from second HTML
    async function verifyOTP(email, otp) {
      const resultDiv = document.getElementById('result') || document.getElementById('otpResult');
      
      if (!email || !otp) {
        if (resultDiv) resultDiv.innerText = "Email and OTP required";
        showToast("Email and OTP required");
        return;
      }

      if (resultDiv) resultDiv.innerText = "Verifying OTP...";
      showToast("Verifying OTP...");

      try {
        const res = await fetch(
          AUTH_API + "/auth/email/verify",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email,
              otp
            })
          }
        );

        const data = await res.json();

        if (data.success) {
          // SAVE SESSION - From second HTML
          localStorage.setItem(
            "auth_user",
            JSON.stringify({
              email,
              loggedIn: true,
              loginTime: Date.now(),
              token: data.token || null
            })
          );
          
          showToast("✅ Login successful! Welcome back.");
          
          // Redirect to dashboard after short delay
          setTimeout(() => {
            window.location.hash = "/dashboard";
          }, 800);
          
        } else {
          const errorMsg = data.message || "Invalid OTP code";
          if (resultDiv) resultDiv.innerText = errorMsg;
          showToast(errorMsg);
        }
        
        return data;

      } catch (err) {
        console.error('Verify Error:', err);
        const errorMsg = "Verification failed. Please try again.";
        if (resultDiv) resultDiv.innerText = errorMsg;
        showToast(errorMsg);
        throw err;
      }
    }

    function logout() {
      localStorage.removeItem("auth_user");
      showToast("Logged out successfully");

    }

      if (!formContainer) return;
      
      formContainer.dataset.pendingEmail = email;
      formContainer.innerHTML = `

      setTimeout(() => document.getElementById('otpCodeInput')?.focus(), 100);
      document.getElementById('otpCodeInput')?.addEventListener('input', (e) => {
        if (e.target.value.length === 6) handleVerifyOTP();
      });

    window.handleVerifyOTP = function() {
      const form = document.getElementById('loginFormEmail') || document.getElementById('emailLoginForm');
      const code = document.getElementById('otpCodeInput')?.value;
      const email = form?.dataset.pendingEmail;
      if (!code || code.length !== 6) { showToast('Enter 6-digit code'); return; }

    window.resendOTP = async function(email) {
      const btn = document.getElementById('resendBtn');

          else btn.textContent = `Resend (${seconds}s)`;
        }, 1000);

    // Helper function for time ago formatting
    function getTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      
      if (seconds < 60) return `${seconds}s`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
      if (seconds < 604800) return `${Math.floor(seconds / 86400)}d`;
      return `${Math.floor(seconds / 604800)}w`;
    }

    // --- Script Re-initialization for Dynamic DOM ---
    function initPageScripts() {
      // Contact Form
      const contactForm = document.getElementById('contactForm');
      if (contactForm) {
        contactForm.addEventListener('submit', (e) => {
          e.preventDefault();
          showToast('Message sent! We\'ll respond within 4 hours.');
          contactForm.reset();
        });
      }

      // Signup Form
      const signupForm = document.getElementById('signupForm');
      if (signupForm) {
        signupForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('signupEmail')?.value;
          if (email) {
            // Simulate successful registration with auto-login
            localStorage.setItem(
              "auth_user",
              JSON.stringify({
                email,
                loggedIn: true,
                loginTime: Date.now(),
                token: null
              })
            );
            showToast('Account created! Welcome to Auth2U.');
            setTimeout(() => { window.location.hash = '#/dashboard'; }, 800);
          }
        });
      }

      // Login Forms - Real API Integration
      const loginFormEmail = document.getElementById('loginFormEmail');
      if (loginFormEmail) {
        loginFormEmail.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('loginEmailInput')?.value || e.target.querySelector('input[type="email"]').value;
          if (email) await sendOTP(email);
        });
      }

      const loginFormSMS = document.getElementById('loginFormSMS');
      if (loginFormSMS) {
        loginFormSMS.addEventListener('submit', async (e) => {
          e.preventDefault();
          showToast('SMS OTP coming soon!');
        });
      }

      const loginFormMagic = document.getElementById('loginFormMagic');
      if (loginFormMagic) {
        loginFormMagic.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = e.target.querySelector('input[type="email"]').value;
          showToast('Magic link sent! Check your inbox.');
        });
      }

      // Pricing FAQ Accordion - REDESIGNED
      const faqBtns = document.querySelectorAll('.faq-btn-pricing');
      faqBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const item = btn.parentElement;
          const isActive = item.classList.contains('active');
          
          // Close all other items with smooth animation
          document.querySelectorAll('.faq-item-pricing').forEach(i => {
            if (i !== item) {
              i.classList.remove('active');
            }
          });
          
          // Toggle current item
          if (!isActive) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });
      });

      // Home Page FAQ Items
      const homeFaqItems = document.querySelectorAll('.faq-item');
      homeFaqItems.forEach(item => {
        item.addEventListener('click', () => {
          const answer = item.querySelector('.faq-answer');
          const icon = item.querySelector('.faq-icon');
          if (item.classList.contains('active')) {
            item.classList.remove('active');
            answer.style.maxHeight = '0';
            icon.style.transform = 'rotate(0deg)';
          } else {
            // Close others
            homeFaqItems.forEach(other => {
              other.classList.remove('active');
              other.querySelector('.faq-answer').style.maxHeight = '0';
              other.querySelector('.faq-icon').style.transform = 'rotate(0deg)';
            });
            item.classList.add('active');
            answer.style.maxHeight = answer.scrollHeight + 'px';
            icon.style.transform = 'rotate(45deg)';
          }
        });
      });

      // Docs Navigation
      const docsNavItems = document.querySelectorAll('.docs-nav-item');
      docsNavItems.forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          docsNavItems.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
        });
      });
    }

    // Helper functions exposed globally
    window.switchLoginTab = function(tab) {
      // Hide all forms
      document.getElementById('loginFormEmail')?.classList.add('hidden');
      document.getElementById('loginFormSMS')?.classList.add('hidden');
      document.getElementById('loginFormMagic')?.classList.add('hidden');
      
      // Reset tab styles
      const tabEmail = document.getElementById('tabEmail');
      const tabSMS = document.getElementById('tabSMS');
      const tabMagic = document.getElementById('tabMagic');
      
      if (tabEmail) tabEmail.className = 'flex-1 py-2 text-[13px] font-medium rounded-md transition-all text-text-muted hover:text-white';
      if (tabSMS) tabSMS.className = 'flex-1 py-2 text-[13px] font-medium rounded-md transition-all text-text-muted hover:text-white';
      if (tabMagic) tabMagic.className = 'flex-1 py-2 text-[13px] font-medium rounded-md transition-all text-text-muted hover:text-white';
      
      // Activate selected
      if (tab === 'email') {
        document.getElementById('loginFormEmail')?.classList.remove('hidden');
        if (tabEmail) tabEmail.className = 'flex-1 py-2 text-[13px] font-medium rounded-md transition-all bg-white/10 text-white';
      } else if (tab === 'sms') {
        document.getElementById('loginFormSMS')?.classList.remove('hidden');
        if (tabSMS) tabSMS.className = 'flex-1 py-2 text-[13px] font-medium rounded-md transition-all bg-white/10 text-white';
      } else {
        document.getElementById('loginFormMagic')?.classList.remove('hidden');
        if (tabMagic) tabMagic.className = 'flex-1 py-2 text-[13px] font-medium rounded-md transition-all bg-white/10 text-white';
      }
    };

    window.togglePassword = function() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon');
      if (input && icon) {
        if (input.type === 'password') {
          input.type = 'text';
          icon.setAttribute('data-icon', 'lucide:eye-off');
        } else {
          input.type = 'password';
          icon.setAttribute('data-icon', 'lucide:eye');
        }
      }
    };
  </script>
